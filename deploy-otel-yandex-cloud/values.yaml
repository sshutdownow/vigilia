opentelemetry-kube-stack:
  # Агент, DaemonSet на каждой ноде
  daemonset:
    enabled: true
    fullnameOverride: "otel-agent"
    config:
      receivers:
        otlp:
          protocols:
            grpc:
              endpoint: "0.0.0.0:4317"
      exporters:
        # Агент пересылает данные на шлюз внутри кластера
        otlp:
          endpoint: "otel-gateway.otel.svc.cluster.local:4317"
          tls:
            insecure: true
      service:
        pipelines:
          metrics:
            receivers: [otlp]
            exporters: [otlp]
          traces:
            receivers: [otlp]
            exporters: [otlp]

  # Центральный шлюз Deployment
  collector:
    enabled: true
    mode: deployment
    fullnameOverride: "otel-gateway"
    config:
      receivers:
        otlp:
          protocols:
            grpc:
              endpoint: "0.0.0.0:4317"
      processors:
        batch:
          send_batch_size: 1000
          timeout: 10s
        k8sattributes:
          extract:
            metadata: [k8s.pod.name, k8s.namespace.name, k8s.node.name]
      exporters:
        # Шлюз авторизуется и отправляет данные в Yandex Monium
        otlp/monium:
          endpoint: "ingest.monium.yandex.cloud:443"
          compression: none
          headers:
            "x-monium-project": "folder__{{ .Values.global.folder_id }}"
            "Authorization": "Api-Key {{ .Values.global.monium_api_key }}"
        debug:
          verbosity: detailed
      service:
        extensions: [health_check]
        pipelines:
          metrics:
            receivers: [otlp]
            processors: [k8sattributes, batch]
            exporters: [otlp, spanmetrics, otlp/monium, debug]
          traces:
            receivers: [otlp]
            processors: [k8sattributes, batch]
            exporters: [opensearch, otlp/monium, debug]
          logs:
            receivers: [ otlp ]
            exporters: [ otlphttp/prometheus, otlp/monium ]


global:
  folder_id: ""
  monium_api_key: ""
  otel_enabled: ""
