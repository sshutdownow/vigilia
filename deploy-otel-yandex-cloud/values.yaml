opentelemetry-kube-stack:
  clusterName: sausage-store-cluster

  # Настройки оператора (управляет внедрением агентов в поды)
  opentelemetry-operator:
    enabled: true
    manager:
      extraArgs:
        - --enable-nginx-instrumentation=true

  rbac:
    create: true

  collectors:
    # Агент (DaemonSet) — собирает данные с нод
    daemon:
      enabled: true
      fullnameOverride: "otel-agent"
      ports:
        - name: otlp-grpc
          port: 4317
          hostPort: 4317
          appProtocol: grpc
          protocol: TCP
        - name: otlp-http
          port: 4318
          hostPort: 4318
          appProtocol: http
          protocol: TCP
      config:
        receivers:
          otlp:
            protocols:
              grpc:
                endpoint: "0.0.0.0:4317"
              http:
                endpoint: "0.0.0.0:4318"
        exporters:
          # Пересылка на центральный шлюз (gateway)
          otlp:
            endpoint: "otel-gateway.otel.svc.cluster.local:4317"
            tls:
              insecure: true
        service:
          pipelines:
            metrics:
              receivers: [otlp]
              exporters: [otlp]
            traces:
              receivers: [otlp]
              exporters: [otlp]
            logs:
              receivers: [otlp]
              exporters: [otlp]

    # Шлюз (Deployment) — отправляет данные в Yandex Cloud
    deployment:
      enabled: true
      fullnameOverride: "otel-gateway"
      # Схема требует имя аккаунта, а не объект
      serviceAccount: "otel-gateway"
      extraEnvs:
        - name: MY_POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
      config:
        receivers:
          otlp:
            protocols:
              grpc:
                endpoint: "0.0.0.0:4317"
        processors:
          batch:
            send_batch_size: 1000
            timeout: 10s
          k8sattributes:
            extract:
              metadata: [k8s.pod.name, k8s.namespace.name, k8s.node.name]
        exporters:
          # Экспорт в Yandex Monitoring (Monium)
          otlp_grpc/monium:
            endpoint: "ingest.monium.yandex.cloud:443"
            compression: zstd
            headers:
              Authorization: "Api-Key {{ .Values.global.monium_api_key }}"
              x-monium-project: "folder__{{ .Values.global.folder_id }}"
            sending_queue:
              enabled: true
            retry_on_failure:
              enabled: true
          debug:
            verbosity: detailed
        service:
          pipelines:
            metrics:
              receivers: [ otlp ]
              processors: [ k8sattributes, batch ]
              exporters: [ otlp_grpc/monium, debug ]
            traces:
              receivers: [ otlp ]
              processors: [ k8sattributes, batch ]
              exporters: [ otlp_grpc/monium, debug ]
            logs:
              receivers: [ otlp ]
              exporters: [ otlp_grpc/monium, debug ]
        telemetry:
          logs:
            level: info
          metrics:
            level: detailed
            readers:
              - periodic:
                  interval: 60000
                  exporter:
                    otlp:
                      protocol: http/protobuf
                      endpoint: http://${env:MY_POD_IP}:4318

# Глобальные параметры чарта
global:
  folder_id: ""
  monium_api_key: ""
  otel_enabled: "true"
