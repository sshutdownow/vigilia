apiVersion: opentelemetry.io/v1alpha1
kind: Instrumentation
metadata:
  name: sausage-store-instrumentation
  namespace: sausage-store
spec:
  # exporter:
  #   endpoint: http://${env:NODE_IP}:4317
  env:
    - name: NODE_IP
      valueFrom:
        fieldRef:
          fieldPath: status.hostIP
    - name: OTEL_EXPORTER_OTLP_ENDPOINT
      value: http://$(NODE_IP):4317 # синтаксис Kubernetes
    - name: OTEL_EXPORTER_OTLP_PROTOCOL
      value: "grpc"
    - name: OTEL_EXPORTER_OTLP_METRICS_PROTOCOL
      value: "grpc"
  propagators:
    - tracecontext
    - baggage
    - b3
  resource:
    attributes:
      - key: "service.name"
        value: "sausage-store"
      - key: "deployment.environment"
        value: "production"
      - key: "project"
        value: "folder__{{ .Values.global.folder_id }}"

  java:
    image: ghcr.io/open-telemetry/opentelemetry-operator/autoinstrumentation-java:latest
  go:
    env:
      # Required if endpoint is set to 4317.
      # Go autoinstrumentation uses http/proto by default
      # so data must be sent to 4318 instead of 4317.
      - name: OTEL_EXPORTER_OTLP_ENDPOINT
        value: http://$(NODE_IP):4318
#        value: http://otel-stack-daemon-collector.otel.svc.cluster.local:4318
#   image: ghcr.io/open-telemetry/opentelemetry-operator/autoinstrumentation-go:latest
    image: ghcr.io/open-telemetry/opentelemetry-go-instrumentation/autoinstrumentation-go:latest
  nginx:
    env:
      - name: OTEL_TRACES_EXPORTER
        value: otlp
    attrs:
    - name: NginxModuleOtelMaxQueueSize
      value: "4096"
    image: ghcr.io/open-telemetry/opentelemetry-operator/autoinstrumentation-apache-httpd:latest
  sdk:
    image: ghcr.io/open-telemetry/opentelemetry-operator/autoinstrumentation-sdk:latest
