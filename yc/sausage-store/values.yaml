sausage-store:
  global:
    imagePullPolicy: Always
    # секрет для скачивания образов
    imagePullSecrets:
      - name: gitlab-pull-secret
    vault:
      enabled: false
      host: ""
    otel_enabled: ""
    gitlab_user: ""
    gitlab_token: ""
    gitlab_registry: ""

  lockbox:
    secret_id: ""

  ingress:
    host: "sausage-store.vigilia.site"
    gwin_ip: ""
    gwin_sg: ""
    certificate_id: ""

  frontend:
    ingress:
      host: sausage-store.vigilia.site
    imagePullSecrets:
      - name: gitlab-pull-secret
    image: cloud-services-engineer.gitlab.yandexcloud.net:5050/s2633401/vigilia/sausage-frontend
    tag: latest
    service:
      type: NodePort
    resources:
      requests:
        memory: "128Mi"
        cpu: "100m"
      limits:
        memory: "256Mi"
        cpu: "1"

  backend:
    imagePullSecrets:
      - name: gitlab-pull-secret
    image: cloud-services-engineer.gitlab.yandexcloud.net:5050/s2633401/vigilia/sausage-backend
    tag: latest
    extraEnv: []
    envFrom: []
    resources:
      requests:
        memory: "512Mi"
        cpu: "100m"
      limits:
        memory: "1000Mi"
        cpu: "1"

  backend-report:
    imagePullSecrets:
      - name: gitlab-pull-secret
    image: cloud-services-engineer.gitlab.yandexcloud.net:5050/s2633401/vigilia/sausage-backend-report
    tag: latest

  infra:
    postgresql:
      containerPort: 5432
    mongodb:
      containerPort: 27017
