{{- if .Values.global -}}
apiVersion: v1
kind: Secret
metadata:
  name: gitlab-pull-secret
  namespace: {{ .Release.Namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
type: kubernetes.io/dockerconfigjson
stringData:
  .dockerconfigjson: {{ printf "{\"auths\":{\"%s\":{\"auth\":\"%s\"}}}" .Values.global.gitlab_registry (printf "%s:%s" .Values.global.gitlab_user .Values.global.gitlab_token | b64enc) | quote }}
{{- end }}
