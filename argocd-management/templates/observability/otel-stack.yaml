apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: otel-stack
  namespace: argocd
spec:
  project: default
  source:
    repoURL: {{ .Values.global.repo_url | quote }}
    path: "deploy-otel-yandex-cloud"
    targetRevision: "master"
  destination:
    server: https://kubernetes.default.svc
    namespace: otel
  syncPolicy:
    automated:
      enabled: false
    syncOptions:
      - CreateNamespace=true
