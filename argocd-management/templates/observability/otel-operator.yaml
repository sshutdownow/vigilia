apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: otel-operator
  namespace: argocd
spec:
  project: default
  source:
    chart: opentelemetry-operator
    repoURL: https://open-telemetry.github.io
    targetRevision: 0.107.0
  destination:
    server: https://kubernetes.default.svc
    # принцип минимальных привилегий
    namespace: sausage-store
  syncPolicy:
    automated:
      enabled: false

