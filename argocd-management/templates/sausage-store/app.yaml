apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sausage-store
  namespace: argocd
spec:
  project: default
  source:
    repoURL: {{ .Values.global.repo_url | quote }}
    path: "yc/sausage-store"
    targetRevision: "master"
    helm:
      releaseName: sausage-store
      valueFiles:
        - "values.yaml"
      values: |
        sausage-store:
          backend:
            extraEnv:
              - name: JAVA_TOOL_OPTIONS
                value: "-Dspring.cloud.vault.enabled=false -Dspring.config.import=optional:vault://kv/sausage-store"
            envFrom:
              - secretRef:
                  name: "sausage-kv-secret"
          lockbox:
            sa_id: {{ .Values.global.sa_id | quote }}
            secret_id: {{ .Values.global.lockbox_secret_id | quote }}
          ingress:
            gwin_ip: {{ .Values.global.gwin_ip | quote }}
            gwin_sg: {{ .Values.global.gwin_sg | quote }}
            certificate_id: {{ .Values.global.certificate_id | quote }}
  destination:
    server: "https://kubernetes.default.svc"
    namespace: "sausage-store"
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions: ["CreateNamespace=true"]
