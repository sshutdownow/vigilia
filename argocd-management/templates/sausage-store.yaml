apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sausage-store
  namespace: argocd
spec:
  project: default
  source:
    repoURL: "https://cloud-services-engineer.gitlab.yandexcloud.net/s2633401/vigilia.git"
    path: "deploy-yandex-cloud"
    targetRevision: "master"
    helm:
      releaseName: sausage-store
      valueFiles:
        - "values.yaml"
      values: |
        sausage-store:
          backend:
            serviceAccountName: "sausage-backend-sa"
            extraEnv:
              - name: JAVA_TOOL_OPTIONS
                value: "-Dspring.cloud.vault.enabled=false -Dspring.config.import=optional:vault://kv/sausage-store"
              - name: REPORT_PATH
                value: "/tmp"
            envFrom:
              - secretRef:
                  name: "sausage-kv-secret"
          lockbox:
            secret_id: {{ .Values.global.lockbox_secret_id | quote }}
          ingress:
            gwin_ip: {{ .Values.global.gwin_ip | quote }}
            gwin_sg: {{ .Values.global.gwin_sg | quote }}
            certificate_id: {{ .Values.global.certificate_id | quote }}
  destination:
    server: "https://kubernetes.default.svc"
    namespace: "sausage-store"
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions: ["CreateNamespace=true"]
