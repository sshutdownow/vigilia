apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongodb
  annotations:
    helm.sh/hook-weight: "-5"
spec:
  serviceName: mongodb
  replicas: 1
  selector:
    matchLabels:
      app: mongodb
  template:
    metadata:
      labels:
        app: mongodb
    spec:
      containers:
      - name: mongodb
        image: mongo:7.0
        envFrom:
          - configMapRef:
              name: mongodb-conf
        ports:
        - containerPort: {{ .Values.mongodb.containerPort }}
        resources:
          requests:
            memory: "128Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "128m"
        volumeMounts:
        - name: mongodb-data
          mountPath: /data/db
        - name: {{ .Release.Name }}-{{ .Chart.Name }}-init
          mountPath: /docker-entrypoint-initdb.d/99-mongo-create-user.js
          subPath: mongo-init.js
          readOnly: true
      volumes:
        - name: {{ .Release.Name }}-{{ .Chart.Name }}-init
          configMap:
            name: {{ .Release.Name }}-{{ .Chart.Name }}-init
            defaultMode: 0444
            items:
              - key: mongo-init.js
                path: mongo-init.js

  volumeClaimTemplates:
  - metadata:
      name: mongodb-data
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: mongodb
  labels:
    app: mongodb
spec:
  ports:
  - port: {{ .Values.mongodb.containerPort }}
    targetPort: {{ .Values.mongodb.containerPort }}
  selector:
    app: mongodb
  clusterIP: None
---
apiVersion: batch/v1
kind: Job
metadata:
  name: mongodb-init
  annotations:
    helm.sh/hook: "post-install"
    helm.sh/hook-weight: "5"  # Вес, чтобы Job выполнялся после StatefulSet
spec:
  template:
    spec:
      containers:
      - name: mongodb-init
        image: mongo:7.0
        envFrom:
          - configMapRef:
              name: mongodb-conf
        resources:
          requests:
            memory: "128Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "128m"
        command:
        - /bin/sh
        - -c
        - |
          until mongosh --host mongodb --eval "print(\"waited for connection\")"; do
            sleep 2
          done
          mongosh --host mongodb --username ${MONGO_INITDB_ROOT_USERNAME} --password ${MONGO_INITDB_ROOT_PASSWORD} --authenticationDatabase admin --eval "
            db = db.getSiblingDB('${MONGO_REPORTS_DATABASE}');
            db.createUser({
              user: '${MONGO_REPORTS_USERNAME}',
              pwd: '${MONGO_REPORTS_PASSWORD}',
              roles: [{ role: 'readWrite', db: '${MONGO_REPORTS_DATABASE}' }]
            });
          "
      restartPolicy: OnFailure
  backoffLimit: 4
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: mongodb-conf
  annotations:
    helm.sh/hook-weight: "-50"
data:
  MONGO_INITDB_ROOT_USERNAME: {{ .Values.mongodb.env.MONGO_INITDB_ROOT_USERNAME }}
  MONGO_INITDB_ROOT_PASSWORD: {{ .Values.mongodb.env.MONGO_INITDB_ROOT_PASSWORD }}
  MONGO_REPORTS_DATABASE: {{ .Values.mongodb.env.MONGO_REPORTS_DATABASE }}
  MONGO_REPORTS_USERNAME: {{ .Values.mongodb.env.MONGO_REPORTS_USERNAME }}
  MONGO_REPORTS_PASSWORD: {{ .Values.mongodb.env.MONGO_REPORTS_PASSWORD }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: "{{ .Release.Name }}-{{ .Chart.Name }}-init"
  annotations:
    helm.sh/hook-weight: "-40"
data:
# https://stackoverflow.com/questions/42912755/how-to-create-a-db-for-mongodb-container-on-start-up
# https://github.com/docker-library/mongo/issues/257
  mongo-init.js: |
    db.createUser(
        {
            user: process.env.MONGO_REPORTS_USERNAME,
            pwd: process.env.MONGO_REPORTS_PASSWORD,
            roles: [
                {
                    role: "readWrite",
                    db: process.env.MONGO_REPORTS_DATABASE
                }
            ]
        }
    );
