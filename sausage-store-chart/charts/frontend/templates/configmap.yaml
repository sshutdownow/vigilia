---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-{{ .Chart.Name }}-conf
data:
  {{ .Values.nginxConf }}: |

    {{- if .Values.global.otel_enabled }}
    # Загружаем модуль, он есть в nginx:1.28-trixie-otel
    load_module modules/ngx_otel_module.so;
    {{- end }}

    user  nginx;
    worker_processes  auto;
    error_log  /var/log/nginx/error.log notice;
    pid        /var/run/nginx.pid;
    events {
        worker_connections  1024;
    }

    http {
        include       /etc/nginx/mime.types;
        default_type  application/octet-stream;

        # ngx_http_realip_module
        set_real_ip_from  10.0.0.0/8;
        real_ip_header    X-Forwarded-For;
        real_ip_recursive on;

        {{- if .Values.global.otel_enabled }}
         otel_exporter {
            endpoint otel-agent-collector.otel.svc.cluster.local:4317;
        }
        otel_trace on;
        otel_service_name {{ .Chart.Name | quote }};
        otel_trace_context propagate;
        otel_span_attr "request_id" $http_x_request_id; # from ALB
        log_format otel_json escape=json '{'
            '"time_local": "$time_local", '
            '"remote_addr": "$remote_addr", '
            '"remote_user": "$remote_user", '
            '"request": "$request", '
            '"status": "$status", '
            '"body_bytes_sent": "$body_bytes_sent", '
            '"http_referer": "$http_referer", '
            '"http_user_agent": "$http_user_agent", '
            '"http_x_forwarded_for": "$http_x_forwarded_for", '
            '"realip_remote_addr": "$realip_remote_addr", '
            '"trace_id": "$otel_trace_id", '
            '"span_id": "$otel_span_id", '
            '"namespace": {{ .Release.Namespace | quote }}, '
            '"parent_id": "$otel_parent_id", '
            '"request_id": "$http_x_request_id"'
        '}';

        access_log syslog:server=${NODE_IP}:54527,tag=nginx,severity=info otel_json;
        {{- end }}

        log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                          '$status $body_bytes_sent "$http_referer" '
                          '"$http_user_agent" "$http_x_forwarded_for" "$realip_remote_addr"';
        access_log  /var/log/nginx/access.log  main;

        sendfile        on;
        keepalive_timeout  5;
        server {

          listen       80;
          location / {
              root   /usr/share/nginx/html;
              index  index.html;
              try_files $uri $uri/ /index.html;
          }

          location /api {
              proxy_set_header X-Request-Id $http_x_request_id;
              proxy_pass http://{{ .Release.Name }}-backend-service:8080;
          }

          error_page   500 502 503 504  /50x.html;
          location = /50x.html {
              root   /usr/share/nginx/html;
          }
      }

    }
