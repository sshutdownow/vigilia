stages:
  - tests
  - plan
  - apply
  - terratest
  - destroy
  - ansible_deploy
  - build
  - package
  - otel 

variables:
  ANSIBLE_ROOT: ${CI_PROJECT_DIR}/ansible
  TF_ROOT: ${CI_PROJECT_DIR}/infra
  PLAN: infra_plan.cache
  BTPLAN: bootstrap.tfplan
  GITLAB_ACCESS_TOKEN: ${TF_HTTP_PASSWORD}
  OPERATION:
    description: "Select CI/CD-operation"
    value: "terraform"
    options:
      - "terraform_bootstrap"
      - "terraform"
      - "ansible"
      - "k8s"
      - "setup_otel"

before_script:
  - cd ${TF_ROOT}
  - touch ./authorized_key.json && chmod 0600 ./authorized_key.json && echo ${AUTHORIZED_KEY} | base64 -d > ./authorized_key.json
  - sed -i -e "s/\${CI_PROJECT_ID}/${CI_PROJECT_ID}/g" -e "s/\${GITLAB_USER_NAME}/${GITLAB_USER_NAME}/g" -e "s/\${TF_HTTP_PASSWORD}/${TF_HTTP_PASSWORD}/g" provider.tf

# TEMPLATE FOR TERRAFORM JOBS ONLY
.terraform_setup:
  image: hashicorp/terraform:latest
  before_script:
    - cd ${TF_ROOT}
    - touch ./authorized_key.json && chmod 0600 ./authorized_key.json && echo ${AUTHORIZED_KEY} | base64 -d > ./authorized_key.json
    - sed -i -e "s/\${CI_PROJECT_ID}/${CI_PROJECT_ID}/g" -e "s/\${GITLAB_USER_NAME}/${GITLAB_USER_NAME}/g" -e "s/\${TF_HTTP_PASSWORD}/${TF_HTTP_PASSWORD}/g" provider.tf
    - terraform init

# Terraform plan для LE-сертификата
bootstrap_plan:
  extends: .terraform_setup
  stage: plan
  variables:
    TF_ROOT: ${CI_PROJECT_DIR}/infra/bootstrap
    TF_LOG: DEBUG
    TF_VAR_cloud_id: ${CLOUD_ID}
    TF_VAR_folder_id: ${FOLDER_ID}
  script:
    - terraform fmt -check -recursive -diff || true
    - terraform validate
    - terraform plan -out=${BTPLAN}
    - terraform show -json ${BTPLAN} > ${BTPLAN}.json
  rules:
    - if: $OPERATION == "terraform_bootstrap" && $CI_COMMIT_BRANCH =~ /^(main|master)$/
      when: always
  artifacts:
    reports: # GitLab displays the details of the Terraform plan within the merge request widget.
      terraform: ${TF_ROOT}/${BTPLAN}.json
    paths:
      - ${TF_ROOT}/${BTPLAN}
      - ${TF_ROOT}/${BTPLAN}.json
    expire_in: 1 yrs

# Terraform cоздание LE-сертификата 
bootstrap_apply:
  extends: .terraform_setup
  stage: apply
  variables:
    TF_ROOT: ${CI_PROJECT_DIR}/infra/bootstrap
    TF_LOG: INFO
    TF_VAR_cloud_id: ${CLOUD_ID}
    TF_VAR_folder_id: ${FOLDER_ID}
  needs: ["bootstrap_plan"]
  script:
    - terraform apply -auto-approve ${BTPLAN}
  rules:
    - if: $OPERATION == "terraform_bootstrap" && $CI_COMMIT_BRANCH =~ /^(main|master)$/
      when: manual
    - when: never

# Terraform удаление LE-сертификата
bootstrap_destroy:
  extends: .terraform_setup
  stage: destroy
  variables:
    TF_ROOT: ${CI_PROJECT_DIR}/infra/bootstrap
    TF_LOG: INFO
    TF_VAR_cloud_id: ${CLOUD_ID}
    TF_VAR_folder_id: ${FOLDER_ID}
  needs: ["bootstrap_apply"]    
  script:
    - terraform init
    - terraform destroy -auto-approve
  rules:
    - if: $OPERATION == "terraform_bootstrap" && $CI_COMMIT_BRANCH =~ /^(main|master)$/
      when: manual
    - when: never


# Выполнение тестов checkov
checkov:
  stage: tests
  allow_failure: true
  image: bridgecrew/checkov:latest
  script:
    - checkov -d . --external-checks-dir ./custom_policies --output junitxml --output-file-path checkov_report
  artifacts:
    reports:
      junit: ${TF_ROOT}/checkov_report/results_junitxml.xml
    paths:
      - ${TF_ROOT}/checkov_report/
  rules:
    - if: $OPERATION == "terraform"
      changes:
        - "infra/**/*"
      when: always

# Terraform plan для инфраструктуры
plan:
  stage: plan
  image: hashicorp/terraform:latest
  needs:
    - checkov
  script:
    - terraform init
    - terraform fmt -check -recursive -diff || true
    - terraform validate
    - terraform plan -out=${PLAN}
    - terraform show -json ${PLAN} > tfplan.json
  rules:
    - if: $OPERATION == "terraform" && $CI_COMMIT_BRANCH =~ /^(main|master)$/
      changes:
        - "infra/**/*"
      when: always
  variables:
    TF_LOG: DEBUG
    TF_VAR_cloud_id: ${CLOUD_ID}
    TF_VAR_folder_id: ${FOLDER_ID}
    TF_VAR_gitlab_username: ${ARGO_USER}
    TF_VAR_gitlab_token: ${ARGO_PASSWD}
    TF_VAR_argocd_admin_password: ${ARGO_ADM_PASSWD}    
    TF_VAR_spring_datasource_user: "${POSTGRES_USER}"
    TF_VAR_spring_datasource_pass: "${POSTGRES_PASSWORD}"
    TF_VAR_spring_mongo_uri: "${MONGODB_URI}"
  artifacts:
    reports: # GitLab displays the details of the Terraform plan within the merge request widget.
      terraform: ${TF_ROOT}/tfplan.json
    paths:
      - ${TF_ROOT}/${PLAN}
      - ${TF_ROOT}/tfplan.json
      - ${TF_ROOT}/.terraform/
    expire_in: 1 yrs

# Создание инфраструктуры Terraform
apply:
  stage: apply
  image: hashicorp/terraform:latest
  script:
    - terraform init
    - terraform apply -auto-approve ${PLAN}
  rules:
    - if: $OPERATION == "terraform" && $CI_COMMIT_BRANCH =~ /^(main|master)$/
      changes:
        - "infra/**/*"
      when: manual
    - when: never
  variables:
    TF_LOG: INFO
    TF_VAR_cloud_id: ${CLOUD_ID}
    TF_VAR_folder_id: ${FOLDER_ID}
    TF_VAR_gitlab_username: ${ARGO_USER}
    TF_VAR_gitlab_token: ${ARGO_PASSWD}
    TF_VAR_argocd_admin_password: ${ARGO_ADM_PASSWD}    
    TF_VAR_spring_datasource_user: "${POSTGRES_USER}"
    TF_VAR_spring_datasource_pass: "${POSTGRES_PASSWORD}"
    TF_VAR_spring_mongo_uri: "${MONGODB_URI}"

# Удаление инфраструктуры Terraform за исключением LE-сертификата
destroy:
  stage: destroy
  image: hashicorp/terraform:latest
  script:
    - terraform init
    - terraform destroy -auto-approve
  rules:
    - if: $OPERATION == "terraform" && $CI_COMMIT_BRANCH =~ /^(main|master)$/
      changes:
        - "infra/**/*"
      when: manual
    - when: never
  variables:
    TF_LOG: INFO
    TF_VAR_cloud_id: ${CLOUD_ID}
    TF_VAR_folder_id: ${FOLDER_ID}
    TF_VAR_gitlab_username: ${ARGO_USER}
    TF_VAR_gitlab_token: ${ARGO_PASSWD}
    TF_VAR_argocd_admin_password: ${ARGO_ADM_PASSWD}    
    TF_VAR_vm_user: "${SERVER_USER}"
    TF_VAR_ssh_key: "${SERVER_SSH_PUBKEY}"

# Выполнение тестов terratest
terratest:
  stage: terratest
  image: golang:1.21
  script:
    - cd test
    - go mod init terratest
    - go mod edit -go=1.21
    - go mod edit -require github.com/gruntwork-io/terratest@v0.46.16
    - go mod tidy
    - go test -v -timeout 3m || true
  needs:
    - job: apply
  dependencies:
    - apply
  rules:
    - if: $OPERATION == "terraform"
      changes:
        - "infra/**/*"
      when: on_success
  allow_failure: false
  variables:
    TF_LOG: INFO
    TF_VAR_cloud_id: ${CLOUD_ID}
    TF_VAR_folder_id: ${FOLDER_ID}
    TF_VAR_gitlab_username: ${ARGO_USER}
    TF_VAR_gitlab_token: ${ARGO_PASSWD}
    TF_VAR_argocd_admin_password: ${ARGO_ADM_PASSWD}    
    TF_VAR_spring_datasource_user: "${POSTGRES_USER}"
    TF_VAR_spring_datasource_pass: "${POSTGRES_PASSWORD}"
    TF_VAR_spring_mongo_uri: "${MONGODB_URI}"

# Деплой ansible-playbook
ansible-vmdevip:
  stage: ansible_deploy
  image: hashicorp/terraform:latest
  script:
    - terraform init
    - echo "VM_DEV_ADDRESS=$(terraform output -raw vm_dev_address)" >> ${CI_PROJECT_DIR}/vmdevip.env
  rules:
    - if: $OPERATION == "ansible"
      when: always
  variables:
    TF_VAR_cloud_id: ${CLOUD_ID}
    TF_VAR_folder_id: ${FOLDER_ID}
    TF_VAR_vm_user: "${SERVER_USER}"
    TF_VAR_ssh_key: "${SERVER_SSH_PUBKEY}"
  artifacts:
    reports:
      dotenv: vmdevip.env

ansible-deploy:
  stage: ansible_deploy
  before_script:
    - cd ${ANSIBLE_ROOT}
    - mkdir -p .ssh && chmod 0700 .ssh
    - echo "$SSH_PRIVATE_KEY" | base64 -d > .ssh/id_rsa && chmod 0400 .ssh/id_rsa
  script:
    - ansible-playbook -i inventory/vm.yml vault-playbook.yml -e "ansible_host=${VM_DEV_ADDRESS} ansible_user=${SERVER_USER} ansible_ssh_private_key_file=.ssh/id_rsa"
  rules:
    - if: $OPERATION == "ansible"
      when: manual
  needs:
    - job: ansible-vmdevip
      artifacts: true
  dependencies:
    - ansible-vmdevip

# Сборка и пуш Docker-образов в GitLAB
build-and-push-images:
  stage: build
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  variables:
    DOCKER_IMAGE_BASE: $CI_REGISTRY_IMAGE
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build --build-arg VERSION=$CI_COMMIT_SHA -t $DOCKER_IMAGE_BASE/sausage-backend:latest ./backend/
    - docker push $DOCKER_IMAGE_BASE/sausage-backend:latest
    - docker build -t $DOCKER_IMAGE_BASE/sausage-frontend:latest ./frontend/
    - docker push $DOCKER_IMAGE_BASE/sausage-frontend:latest
    - docker build -t $DOCKER_IMAGE_BASE/sausage-backend-report:latest ./backend-report/
    - docker push $DOCKER_IMAGE_BASE/sausage-backend-report:latest
  rules:
    - if: $OPERATION == "k8s"
      when: always

# Упаковка и пуш Helm-чарта в GitLAB
package-helm-chart:
  stage: package
  image: 
    name: alpine/helm:3.12.0
    entrypoint: [""]
  variables:
    HELM_PACKAGE_URL: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/helm/api/stable/charts"
    HELM_OCI_REGISTRY: "oci://${CI_REGISTRY}/${CI_PROJECT_PATH}/charts"
  before_script:    
    - apk add curl
  script: # CI_PIPELINE_IID -internal ID that starts at 1 for each project and increments by 1 with every new pipeline
    - export CUR_VER=$(helm show chart ./sausage-store-chart/ | grep "^version:" | awk '{print $2}')
    - export NEW_VER=$(echo "$CUR_VER" | awk -F. -v iid="$CI_PIPELINE_IID" '{print $1"."$2"."iid}')
    - >
      sed -i -e "s/^version:.*$/version: $NEW_VER/" ./sausage-store-chart/Chart.yaml
    - echo $CI_JOB_TOKEN | helm registry login $CI_REGISTRY --username gitlab-ci-token --password-stdin
    - helm package ./sausage-store-chart/
    - helm push sausage-store-*.tgz $HELM_OCI_REGISTRY
  needs:
    - build-and-push-images
  rules:
    - if: $OPERATION == "k8s"
      when: manual
  tags:
    - docker


generate-monium-key:
  stage: otel
  image: hashicorp/terraform:latest
  script:
    - terraform init
    - terraform apply -var="enable_monium_key=true" -target=yandex_iam_service_account_api_key.monium_key -auto-approve
    - echo "MONIUM_API_KEY=$(terraform output -raw monium_api_key)" >> ${CI_PROJECT_DIR}/monium.env
    - echo "ARGO_SERVER=$(terraform output -raw argocd_domain)" >> ${CI_PROJECT_DIR}/monium.env
  artifacts:
    reports:
      dotenv: monium.env
  rules:
    - if: $OPERATION == "otel"
      when: manual

activate-otel-monitoring:
  stage: otel
  image: argoproj/argocd:v2.8.4
  needs: ["generate-monium-key"]
  script:
    - argocd login $ARGO_SERVER --username "${ARGO_USER:-admin}" --password "${ARGO_ADM_PASSWD}" --grpc-web
    - argocd app set otel-collector -p global.monium_api_key=$MONIUM_API_KEY
    - argocd app sync otel-collector
    - argocd app set sausage-store -p sausage-store.backend.otel_enabled=true
    - argocd app sync sausage-store
  rules:
    - if: $OPERATION == "setup_otel"
      when: on_success
 