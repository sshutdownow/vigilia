apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sausage-store-yandex-ingress
  namespace: sausage-store
  annotations:
    "gwin.yandex.cloud/groupName": "ingress"
    "gwin.yandex.cloud/externalIPv4Address": {{ index .Values "sausage_store" "ingress" "gwin_ip" | default "auto" | quote }}
    "gwin.yandex.cloud/securityGroups": {{ index .Values "sausage_store" "ingress" "gwin_sg" | quote }}
spec:
  ingressClassName: "gwin-default"
  tls:
    - hosts:
        - "sausage-store.vigilia.site"
      secretName: {{ printf "yc-certmgr-cert-id-%s" (index .Values "sausage_store" "ingress" "certificate_id") | quote }}
  rules:
    - host: "sausage-store.vigilia.site"
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: sausage-store-frontend-service
                port:
                  number: 80
