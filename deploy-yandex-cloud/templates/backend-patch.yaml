apiVersion: apps/v1
kind: Deployment
metadata:
  name: sausage-store-backend 
  namespace: sausage-store
spec:
  template:
    spec:
      serviceAccountName: sausage-backend-sa
      containers:
        - name: backend
          env:
            # Отключаем Vault
            - name: JAVA_TOOL_OPTIONS
              value: "-Dspring.cloud.vault.enabled=false -Dspring.config.import=optional:vault://kv/sausage-store"
            - name: SPRING_CLOUD_VAULT_ENABLED
              value: "false"
            - name: SPRING_CONFIG_IMPORT
              value: "optional:vault://kv/sausage-store"
          envFrom:
            - secretRef:
                name: sausage-kv-secret
