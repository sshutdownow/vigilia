apiVersion: apps/v1
kind: Deployment
metadata:
  name: sausage-store-backend-report
  namespace: sausage-store
  labels:
    app: sausage-store-backend-report
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sausage-store-backend-report
  template:
    metadata:
      labels:
        app: sausage-store-backend-report
    spec:
      serviceAccountName: sausage-backend-sa
      imagePullSecrets:
        - name: gitlab-pull-secret
      containers:
        - name: backend-report
          image: "cloud-services-engineer.gitlab.yandexcloud.net:5050/s2633401/vigilia/sausage-backend-report:latest"
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: DB
              valueFrom:
                secretKeyRef:
                  name: sausage-kv-secret
                  key: SPRING_DATA_MONGODB_URI
            - name: PORT
              value: "8080"
          resources:
            limits:
              cpu: 200m
              memory: 256Mi
            requests:
              cpu: 100m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: sausage-store-backend-report-service
  namespace: sausage-store
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
      name: http
  selector:
    app: sausage-store-backend-report
