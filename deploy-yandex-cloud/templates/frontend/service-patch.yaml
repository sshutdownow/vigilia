apiVersion: v1
kind: Service
metadata:
  name: sausage-store-frontend-service
  namespace: {{ .Release.Namespace }}
spec:
  type: NodePort
  ports:
    - protocol: TCP
      port: {{ (index .Values "sausage-store").frontend.service.port | default 80 }}
      targetPort: {{ (index .Values "sausage-store").frontend.service.port | default 80 }}
