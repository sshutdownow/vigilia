apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-frontend-service
  labels:
    app: {{ .Release.Name }}-frontend-service
spec:
  type: NodePort
  ports:
    - port: {{ (index .Values "sausage-store").frontend.service.port | default 80 }}
      protocol: TCP
      targetPort: 80
      name: http
  selector:
    app: {{ .Release.Name }}-frontend
