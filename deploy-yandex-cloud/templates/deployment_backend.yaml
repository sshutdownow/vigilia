apiVersion: apps/v1
kind: Deployment
metadata:
  name: sausage-store-backend
  namespace: sausage-store
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sausage-store-backend
  template:
    metadata:
      labels:
        app: sausage-store-backend
    spec:
      annotations:
      path: /actuator/prometheus
      port: "8080"
      scrape: "true"
      serviceAccountName: sausage-backend-sa
      imagePullSecrets:
        - name: gitlab-pull-secret
      containers:
        - name: backend
          image: cloud-services-engineer.gitlab.yandexcloud.net:5050/s2633401/vigilia/sausage-backend
          tag: latest
          env:
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: sausage-kv-secret
                  key: SPRING_DATASOURCE_USERNAME
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sausage-kv-secret
                  key: SPRING_DATASOURCE_PASSWORD
            - name: SPRING_DATA_MONGODB_URI
              valueFrom:
                secretKeyRef:
                  name: sausage-kv-secret
                  key: SPRING_DATA_MONGODB_URI
            - postgresUri: jdbc:postgresql://postgresql:5432/sausage-store
            - reportPath: /logs/reports
            - logPath: /logs
          ports:
            - containerPort: 8080
          revisionHistoryLimit: 15
          replicas: 1
          strategy:
            type: RollingUpdate
            rollingUpdate:
              maxUnavailable: 50%
              maxSurge: 20%
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "1"
          containerPort: 8080
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 1
            failureThreshold: 6
          vpa:
            updatePolicy:
              updateMode: "Auto"
            resourcePolicy:
              containerPolicies:
                - containerName: "*"
                  minAllowed:
                    cpu: 0m
                    memory: 0Mi
                  maxAllowed:
                    cpu: 1
                    memory: 1Gi
                  controlledResources: ["cpu", "memory"]
                  controlledValues: RequestsAndLimits