apiVersion: v1
kind: Service
metadata:
  name: sausage-store-frontend-service
  namespace: sausage-store
  labels:
    app: sausage-store-frontend-service
spec:
  type: NodePort 
  ports:
    - port: 80
      protocol: TCP
      targetPort: 80 
      name: http
  selector:
    app: sausage-store-frontend
